name: Continuous Delivery Workflow

on:
  push:
    branches: 
    - main

permissions:
  contents: read

jobs:
  deliver:
    runs-on: ubuntu-latest

    steps:
  
      - name: Check out repository code
        uses: actions/checkout@v5
      
      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: CD-project
          path: |
            README.md
            **.py

