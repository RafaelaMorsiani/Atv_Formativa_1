<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Converter</title>
    <!-- Modern font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-brl: #10b981;
            --accent-eur: #f59e0b;
            --accent-pen: #ec4899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group span {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .rates-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .rate-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .rate-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }

        .currency-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .flag {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }

        .flag-brl { background: var(--accent-brl); }
        .flag-eur { background: var(--accent-eur); }
        .flag-pen { background: var(--accent-pen); }

        .currency-code {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .currency-name {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .amount-display {
            text-align: right;
        }

        .converted-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .exchange-rate {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 1rem;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <p class="subtitle">Live exchange rates from USD</p>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Fetching latest rates...</p>
        </div>

        <div id="app-content" style="display: none;">
            <div class="input-group">
                <span>$</span>
                <input type="number" id="usd-input" value="1" min="0" step="0.01" placeholder="Enter USD amount">
            </div>

            <div class="rates-grid">
                <!-- BRL -->
                <div class="rate-card">
                    <div class="currency-info">
                        <div class="flag flag-brl">R$</div>
                        <div>
                            <div class="currency-code">BRL</div>
                            <div class="currency-name">Brazilian Real</div>
                        </div>
                    </div>
                    <div class="amount-display">
                        <div class="converted-value" id="val-brl">0.00</div>
                        <div class="exchange-rate" id="rate-brl">1 USD = 0.00 BRL</div>
                    </div>
                </div>

                <!-- EUR -->
                <div class="rate-card">
                    <div class="currency-info">
                        <div class="flag flag-eur">€</div>
                        <div>
                            <div class="currency-code">EUR</div>
                            <div class="currency-name">Euro</div>
                        </div>
                    </div>
                    <div class="amount-display">
                        <div class="converted-value" id="val-eur">0.00</div>
                        <div class="exchange-rate" id="rate-eur">1 USD = 0.00 EUR</div>
                    </div>
                </div>

                <!-- PEN -->
                <div class="rate-card">
                    <div class="currency-info">
                        <div class="flag flag-pen">S/</div>
                        <div>
                            <div class="currency-code">PEN</div>
                            <div class="currency-name">Peruvian Sol</div>
                        </div>
                    </div>
                    <div class="amount-display">
                        <div class="converted-value" id="val-pen">0.00</div>
                        <div class="exchange-rate" id="rate-pen">1 USD = 0.00 PEN</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentRates = { BRL: 0, EUR: 0, PEN: 0 };

        const usdInput = document.getElementById('usd-input');
        const loadingDiv = document.getElementById('loading');
        const appContentDiv = document.getElementById('app-content');

        // Elements to update
        const els = {
            BRL: { val: document.getElementById('val-brl'), rate: document.getElementById('rate-brl') },
            EUR: { val: document.getElementById('val-eur'), rate: document.getElementById('rate-eur') },
            PEN: { val: document.getElementById('val-pen'), rate: document.getElementById('rate-pen') }
        };

        function updateValues() {
            const usd = parseFloat(usdInput.value) || 0;
            
            ['BRL', 'EUR', 'PEN'].forEach(curr => {
                const converted = (usd * currentRates[curr]).toFixed(2);
                els[curr].val.innerText = converted;
            });
        }

        async function fetchRates() {
            loadingDiv.style.display = 'block';
            try {
                const response = await fetch('/api/rates');
                const data = await response.json();
                
                if (data.status === 'success') {
                    currentRates = data.rates;
                    
                    // Update rate text
                    ['BRL', 'EUR', 'PEN'].forEach(curr => {
                        els[curr].rate.innerText = `1 USD = ${currentRates[curr].toFixed(2)} ${curr}`;
                    });
                    
                    updateValues();
                    
                    loadingDiv.style.display = 'none';
                    appContentDiv.style.display = 'block';
                } else {
                    console.error("Failed to fetch rates:", data.message);
                    loadingDiv.innerHTML = '<p style="color:#ef4444;">Failed to fetch rates. Please try again later.</p>';
                }
            } catch (error) {
                console.error("Error fetching rates:", error);
                loadingDiv.innerHTML = '<p style="color:#ef4444;">Network error. Please try again later.</p>';
            }
        }

        // Add event listener for input changes
        usdInput.addEventListener('input', updateValues);

        // Fetch initially
        fetchRates();
    </script>
</body>
</html>
